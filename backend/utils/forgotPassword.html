<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Habit Team Invitation</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f8f9fa;
      }

      .email-container {
        background-color: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 600;
      }

      .header .subtitle {
        margin: 8px 0 0 0;
        font-size: 16px;
        opacity: 0.9;
      }

      .content {
        padding: 30px;
      }

      .greeting {
        font-size: 18px;
        margin-bottom: 20px;
        color: #2c3e50;
      }

      .habit-details {
        background: linear-gradient(135deg, #00bd23 0%, #31ffdd 100%);
        border-radius: 8px;
        padding: 25px;
        margin: 25px 0;
        color: white;
      }

      .habit-name {
        font-size: 24px;
        font-weight: 700;
        margin: 0 0 15px 0;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }

      .habit-description {
        font-size: 16px;
        margin: 0 0 20px 0;
        opacity: 0.95;
        line-height: 1.5;
      }

      .habit-meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }

      .meta-item {
        background: rgba(255, 255, 255, 0.2);
        padding: 12px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 500;
        backdrop-filter: blur(10px);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 0;
      }

      .meta-label {
        font-weight: 600;
        margin-right: 5px;
      }

      .invitation-text {
        font-size: 16px;
        margin: 25px 0;
        color: #34495e;
        line-height: 1.6;
      }

      .cta-section {
        text-align: center;
        margin: 35px 0;
      }

      .cta-button {
        display: inline-block;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        padding: 15px 35px;
        border-radius: 30px;
        font-weight: 600;
        font-size: 16px;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        transition: transform 0.2s ease;
      }

      .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
      }

      .footer {
        background-color: #f8f9fa;
        padding: 25px;
        text-align: center;
        border-top: 1px solid #dee2e6;
      }

      .footer-text {
        color: #6c757d;
        font-size: 14px;
        margin: 0;
      }

      .sender-info {
        background-color: #e3f2fd;
        border-left: 4px solid #2196f3;
        padding: 15px;
        margin: 20px 0;
        border-radius: 0 8px 8px 0;
      }

      .sender-info strong {
        color: #1976d2;
      }

      @media (max-width: 600px) {
        body {
          padding: 10px;
        }

        .header {
          padding: 20px;
        }

        .header h1 {
          font-size: 24px;
        }

        .content {
          padding: 20px;
        }

        .habit-meta {
          grid-template-columns: 1fr;
          gap: 12px;
          margin-top: 15px;
        }

        .meta-item {
          padding: 15px;
          font-size: 15px;
        }

        .meta-label {
          margin-bottom: 5px;
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div class="email-container">
      <!-- Header -->
      <div class="header">
        <h1>
          <img src="cid:logo" alt="StreakForce Logo" width="100" />
          StreakForce
        </h1>
        <p class="subtitle">Build Better Habits Together</p>
      </div>

      <!-- Main Content -->
      <div class="content">
        <div class="greeting">Hi {{recipientName}}! 👋</div>

        <div class="invitation-text">
          Click <a href="{{resetPasswordLink}}">here</a> to reset your password
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <p class="footer-text">
          This email was sent through StreakForce - Build Better Habits Together
        </p>
      </div>
    </div>
  </body>
</html>
